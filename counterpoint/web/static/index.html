<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Counterpoint Desk</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font: 15px/1.6 -apple-system, system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  .row { display: flex; gap: .5rem; margin: 1rem 0; }
  input, button { font-size: 1rem; padding: .5rem .7rem; }
  input { flex: 1; }
  button { cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #f6f6f6; }
  button.primary { background: #1a56db; color: #fff; border-color: #1a56db; }
  #status { color: #666; min-height: 1.4em; }
  #memo { border: 1px solid #eee; border-radius: 8px; padding: 1rem 1.4rem; margin-top: 1rem; }
  #memo:empty { display: none; }
  .signoff { margin-top: 1rem; display: none; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .note { color: #999; font-size: .85rem; }
</style>
</head>
<body>
<h1>Counterpoint 投研台</h1>
<p class="note">输入股票代码,后台自动建房间、跑多空对抗 + 风险压测,产出研究备忘录。仅供教育研究,非投资建议。</p>

<div class="row">
  <input id="ticker" placeholder="股票代码,如 AAPL" autocomplete="off">
  <button class="primary" id="go">研究</button>
</div>
<div id="status"></div>

<div id="memo"></div>

<div class="signoff" id="signoff">
  <span>人工签字门:</span>
  <input id="signer" placeholder="签字人姓名(必填)" style="width:11em">
  <input id="comments" placeholder="意见(可选)" style="flex:1">
  <button data-d="APPROVE">APPROVE</button>
  <button data-d="REJECT">REJECT</button>
  <button data-d="REVISE">REVISE</button>
</div>

<script>
let current = null, timer = null, cleaned = false, signing = false;
const $ = s => document.querySelector(s);

async function poll(ticker) {
  const r = await fetch(`/api/result/${ticker}`).then(x => x.json());
  if (r.found) {
    $('#memo').innerHTML = marked.parse(r.markdown);
    if (r.signed) {
      $('#status').textContent = `✅ 已签字:${r.decision}(${r.signer || ''}) · 评级 ${r.rating || '—'}`;
      $('#signoff').style.display = 'none';
      clearInterval(timer); timer = null;
      if (!cleaned) { cleaned = true; fetch(`/api/cleanup/${ticker}`, {method: 'POST'}); }  // 只清一次
    } else {
      $('#status').textContent = `备忘录已生成(评级 ${r.rating || '—'}),待人工签字。`;
      $('#signoff').style.display = 'flex';
    }
  } else {
    $('#status').textContent = '研究进行中…(多空盲评 → 反驳 → 风险压测 → 综合,约需数分钟)';
  }
}

$('#go').onclick = async () => {
  const ticker = $('#ticker').value.trim().toUpperCase();
  if (!ticker) return;
  current = ticker; cleaned = false; signing = false;
  $('#memo').innerHTML = ''; $('#signoff').style.display = 'none';
  $('#status').textContent = '正在建房间并发起研究…';
  try {
    await fetch('/api/research', {method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ticker})}).then(x => x.json());
  } catch (e) { $('#status').textContent = '发起失败:' + e; return; }
  if (timer) clearInterval(timer);
  timer = setInterval(() => poll(current), 8000);
  poll(current);
};

$('#signoff').onclick = async (ev) => {
  const d = ev.target.dataset.d;
  if (!d || !current || signing) return;   // signing 防双击重复提交
  const signer = $('#signer').value.trim();
  if (!signer) { $('#status').textContent = '请先填写签字人姓名(人工签字门需真实署名)'; return; }
  signing = true;
  $('#status').textContent = `提交签字 ${d}…`;
  const r = await fetch('/api/signoff', {method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ticker: current, decision: d, signer, comments: $('#comments').value.trim()})}).then(x => x.json());
  if (!r.ok) { $('#status').textContent = '签字失败:' + (r.error || r.message || ''); return; }
  // 签字已直接落库;轮询会读到 signed=true,随后(见 poll)再移除 agent 清场
  if (!timer) timer = setInterval(() => poll(current), 8000);
  setTimeout(() => poll(current), 1500);
};
</script>
</body>
</html>
