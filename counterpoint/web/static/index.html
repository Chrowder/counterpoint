<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Counterpoint Desk</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font: 15px/1.6 -apple-system, system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
  .lang { cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #f6f6f6; font-size: .85rem; padding: .25rem .6rem; }
  .row { display: flex; gap: .5rem; margin: 1rem 0; }
  input, button { font-size: 1rem; padding: .5rem .7rem; }
  input { flex: 1; }
  button { cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #f6f6f6; }
  button.primary { background: #1a56db; color: #fff; border-color: #1a56db; }
  #status { color: #666; min-height: 1.4em; }
  #memo { border: 1px solid #eee; border-radius: 8px; padding: 1rem 1.4rem; margin-top: 1rem; }
  #memo:empty { display: none; }
  .signoff { margin-top: 1rem; display: none; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .note { color: #999; font-size: .85rem; }
</style>
</head>
<body>
<div class="top">
  <h1 data-i18n="title">Counterpoint 投研台</h1>
  <button class="lang" id="lang"></button>
</div>
<p class="note" data-i18n="note">输入股票代码,后台自动建房间、跑多空对抗 + 风险压测,产出研究备忘录。仅供教育研究,非投资建议。</p>

<div class="row">
  <input id="ticker" autocomplete="off">
  <button class="primary" id="go"></button>
</div>
<div id="status"></div>

<div id="memo"></div>

<div class="signoff" id="signoff">
  <span data-i18n="gate"></span>
  <input id="signer" style="width:11em">
  <input id="comments" style="flex:1">
  <button data-d="APPROVE">APPROVE</button>
  <button data-d="REJECT">REJECT</button>
  <button data-d="REVISE">REVISE</button>
</div>

<script>
// 轻量 i18n:与 React UI 同源思路。locale 由 ?lang/localStorage 决定,默认 zh;UI 语言独立于后端 OUTPUT_LANG。
const STR = {
  zh: {
    title: 'Counterpoint 投研台',
    note: '输入股票代码,后台自动建房间、跑多空对抗 + 风险压测,产出研究备忘录。仅供教育研究,非投资建议。',
    ticker_ph: '股票代码,如 AAPL', research: '研究',
    gate: '人工签字门:', signer_ph: '签字人姓名(必填)', comments_ph: '意见(可选)',
    starting: '正在建房间并发起研究…',
    start_failed: '发起失败:{err}',
    in_progress: '研究进行中…(多空盲评 → 反驳 → 风险压测 → 综合,约需数分钟)',
    memo_ready: '备忘录已生成(评级 {rating}),待人工签字。',
    signed: '✅ 已签字:{decision}({signer}) · 评级 {rating}',
    need_signer: '请先填写签字人姓名(人工签字门需真实署名)',
    submitting: '提交签字 {decision}…',
    sign_failed: '签字失败:{err}',
  },
  en: {
    title: 'Counterpoint Desk',
    note: 'Enter a ticker; the backend creates a room, runs the bull/bear debate + risk stress-test, and produces a research memo. For education/research only, not investment advice.',
    ticker_ph: 'Ticker, e.g. AAPL', research: 'Research',
    gate: 'Human sign-off gate:', signer_ph: 'Signer name (required)', comments_ph: 'Comments (optional)',
    starting: 'Creating room and starting research…',
    start_failed: 'Start failed: {err}',
    in_progress: 'Research in progress… (blind review → rebuttal → risk stress-test → synthesis, ~a few minutes)',
    memo_ready: 'Memo generated (rating {rating}); awaiting human sign-off.',
    signed: '✅ Signed: {decision} ({signer}) · rating {rating}',
    need_signer: 'Please enter the signer name first (the sign-off gate needs a real name)',
    submitting: 'Submitting {decision} sign-off…',
    sign_failed: 'Sign-off failed: {err}',
  },
};
function detectLang() {
  const q = new URLSearchParams(location.search).get('lang');
  if (q === 'zh' || q === 'en') { try { localStorage.setItem('cp_lang', q); } catch {} return q; }
  let s = null; try { s = localStorage.getItem('cp_lang'); } catch {}
  return s === 'zh' ? 'zh' : 'en';  // 默认英文
}
let LANG = detectLang();
function t(k, vars) {
  let s = (STR[LANG] && STR[LANG][k]) ?? STR.zh[k] ?? k;
  if (vars) for (const v in vars) s = s.replaceAll('{' + v + '}', vars[v]);
  return s;
}
function applyLang() {
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  $('#ticker').placeholder = t('ticker_ph');
  $('#go').textContent = t('research');
  $('#signer').placeholder = t('signer_ph');
  $('#comments').placeholder = t('comments_ph');
  $('#lang').textContent = LANG === 'zh' ? 'EN' : '中';
}

let current = null, timer = null, cleaned = false, signing = false;
const $ = s => document.querySelector(s);

$('#lang').onclick = () => {
  LANG = LANG === 'zh' ? 'en' : 'zh';
  try { localStorage.setItem('cp_lang', LANG); } catch {}
  applyLang();
};

async function poll(ticker) {
  const r = await fetch(`/api/result/${ticker}`).then(x => x.json());
  if (r.found) {
    $('#memo').innerHTML = marked.parse(r.markdown);
    if (r.signed) {
      $('#status').textContent = t('signed', { decision: r.decision, signer: r.signer || '', rating: r.rating || '—' });
      $('#signoff').style.display = 'none';
      clearInterval(timer); timer = null;
      if (!cleaned) { cleaned = true; fetch(`/api/cleanup/${ticker}`, {method: 'POST'}); }  // 只清一次
    } else {
      $('#status').textContent = t('memo_ready', { rating: r.rating || '—' });
      $('#signoff').style.display = 'flex';
    }
  } else {
    $('#status').textContent = t('in_progress');
  }
}

$('#go').onclick = async () => {
  const ticker = $('#ticker').value.trim().toUpperCase();
  if (!ticker) return;
  current = ticker; cleaned = false; signing = false;
  $('#memo').innerHTML = ''; $('#signoff').style.display = 'none';
  $('#status').textContent = t('starting');
  try {
    await fetch('/api/research', {method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ticker})}).then(x => x.json());
  } catch (e) { $('#status').textContent = t('start_failed', { err: e }); return; }
  if (timer) clearInterval(timer);
  timer = setInterval(() => poll(current), 8000);
  poll(current);
};

$('#signoff').onclick = async (ev) => {
  const d = ev.target.dataset.d;
  if (!d || !current || signing) return;   // signing 防双击重复提交
  const signer = $('#signer').value.trim();
  if (!signer) { $('#status').textContent = t('need_signer'); return; }
  signing = true;
  $('#status').textContent = t('submitting', { decision: d });
  const r = await fetch('/api/signoff', {method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ticker: current, decision: d, signer, comments: $('#comments').value.trim()})}).then(x => x.json());
  if (!r.ok) { $('#status').textContent = t('sign_failed', { err: r.error || r.message || '' }); return; }
  // 签字已直接落库;轮询会读到 signed=true,随后(见 poll)再移除 agent 清场
  if (!timer) timer = setInterval(() => poll(current), 8000);
  setTimeout(() => poll(current), 1500);
};

applyLang();
</script>
</body>
</html>
